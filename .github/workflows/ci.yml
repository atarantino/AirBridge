name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: global.json

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: src/AirBridge.RaopHost/requirements.txt

      - name: Restore .NET dependencies
        run: dotnet restore AirBridge.sln

      - name: Run .NET tests
        run: dotnet test AirBridge.sln --no-restore --configuration Release

      - name: Run browser-extension tests
        run: node --test tests/browser-extension.test.js tests/firefox-extension.test.js

      - name: Install Python dependencies
        run: python -m pip install --requirement src/AirBridge.RaopHost/requirements.txt

      - name: Run Python tests
        working-directory: src/AirBridge.RaopHost
        run: python -m unittest discover -v

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
